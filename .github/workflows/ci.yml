name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check . --select E,F,W --ignore E501

  validate-schemas:
    runs-on: ubuntu-latest
    env:
      DEMO_MODE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pydantic only (no infra needed for schema validation)
        run: pip install pydantic python-dotenv

      - name: Validate Pydantic schemas import cleanly
        run: python -c "from models.schemas import GitHubEvent, DeveloperInsight; print('Schemas OK')"
